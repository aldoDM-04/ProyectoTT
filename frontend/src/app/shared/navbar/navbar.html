<nav class="navbar" (click)="closeProfile($event)">
  <div class="nav-brand">
    <div class="nav-flame">
      <svg viewBox="0 0 28 36" fill="none" width="17" height="22">
        <path d="M14 1C9 10 5 14 5 19a9 9 0 0018 0c0-5-3.5-9-9-18z" fill="url(#nbf)" />
        <path d="M14 12C11 17 10 19 10 21a4 4 0 008 0c0-2-2-4-4-9z" fill="rgba(255,220,120,0.9)" />
        <defs>
          <linearGradient id="nbf" x1="14" y1="1" x2="14" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FFAB76" />
            <stop offset="1" stop-color="#C0390D" />
          </linearGradient>
        </defs>
      </svg>
    </div>
    <span class="nav-title">Detección de Zonas de Riesgo</span>
  </div>

  <div class="nav-links">
    <a routerLink="/home" routerLinkActive="active">Inicio</a>
    <a routerLink="/process-image" routerLinkActive="active">Procesar Imagen</a>

    <a routerLink="/history" routerLinkActive="active">Historial</a>
  </div>

  <div class="nav-end">
    <!-- Theme toggle -->
    <button
      class="theme-toggle"
      (click)="theme.toggle()"
      [title]="theme.isDark ? 'Modo claro' : 'Modo oscuro'"
    >
      <svg
        *ngIf="theme.isDark"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        width="16"
        height="16"
      >
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
      <svg
        *ngIf="!theme.isDark"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        width="16"
        height="16"
      >
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
      </svg>
    </button>

    <!-- Profile -->
    <div class="nav-profile" (click)="$event.stopPropagation(); toggleProfile()">
      <div class="nav-avatar">{{ userInitials }}</div>
      <div class="profile-popup" *ngIf="showProfile" (click)="$event.stopPropagation()">
        <div class="pp-top">
          <div class="pp-avatar">{{ userInitials }}</div>
          <div>
            <p class="pp-name">{{ user?.nombre }}</p>
            <p class="pp-email">{{ user?.correo }}</p>
          </div>
        </div>
        <div *ngIf="user?.organizacion" class="pp-org">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="12"
            height="12"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          {{ user?.organizacion }}
        </div>
        <button class="pp-logout" (click)="logout()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="13"
            height="13"
          >
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Cerrar Sesión
        </button>
      </div>
    </div>
  </div>
</nav>
